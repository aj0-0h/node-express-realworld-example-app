apiVersion: apps/v1
kind: Deployment
metadata:
  name: realworld-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realworld-api
  template:
    metadata:
      labels:
        app: realworld-api
    spec:
      containers:
      - name: api
        image: realworld-app:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: "postgresql://user:your_secret_password_here@db-service:5432/realworld"
        - name: JWT_SECRET
          value: "your_jwt_secret_here"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: NodePort
  selector:
    app: realworld-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
